<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Student Data Using JSON - Lab Task 7" />
    <title>Student Data JSON | Lab 03</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }

        .code-block {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-x: auto;
            font-family: monospace;
            font-size: 14px;
            color: var(--accent1);
            border-left: 4px solid var(--accent2);
        }

        .student-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            animation: fadeUp 0.4s ease backwards;
            transition: transform 0.3s ease;
        }

        .student-item:hover {
            transform: translateY(-4px);
            border-color: var(--accent3);
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 80px;
        }

        .value {
            color: var(--text);
            font-weight: 500;
            font-size: 16px;
        }

        .courses-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .course-tag {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 999px;
        }

        .action-bar {
            margin-bottom: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="badge">JSON Parsing &amp; Destructuring</div>
            <h1>Student Data JSON</h1>
            <p class="subtitle">Lab 03 &mdash; Task 07</p>
        </header>

        <div class="action-bar">
            <button onclick="processData()">Parse JSON &amp; Render</button>
        </div>

        <div class="split-layout">
            <div>
                <h3>1. Raw JSON Data</h3>
                <pre class="code-block" id="json-schema">// JSON String will appear here...</pre>
            </div>

            <div>
                <h3>2. Rendered Objects</h3>
                <div id="students-container">
                    <p
                        style="color: var(--muted); padding: 20px; text-align: center; border: 1px dashed var(--border); border-radius: 8px;">
                        Click the button above to parse the JSON and display logic.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
