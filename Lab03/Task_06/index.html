<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mini University Portal - Lab Task 6" />
    <title>University Portal | Lab 03</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }

        .controls {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:disabled {
            background: var(--muted);
            cursor: not-allowed;
            transform: none;
        }

        #status-msg {
            text-align: center;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
            color: var(--accent3);
        }

        .student-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            animation: fadeUp 0.4s ease backwards;
        }

        .student-item header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .student-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .student-id {
            font-size: 14px;
            color: var(--muted);
        }

        .courses-title {
            font-size: 14px;
            color: var(--accent1);
            margin-bottom: 8px;
        }

        .courses-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .course-tag {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 999px;
        }

        .add-course-form {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .add-course-form input {
            flex: 1;
            padding: 8px;
        }

        .add-course-form button {
            padding: 8px 16px;
            font-size: 14px;
            background: var(--success);
        }

        .save-btn {
            background: var(--success);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 600;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div>Saving to database...</div>
    </div>

    <div class="container">
        <header class="header">
            <div class="badge">Class, Map, Set, Promise</div>
            <h1>Mini University Portal</h1>
            <p class="subtitle">Lab 03 &mdash; Task 06</p>
        </header>

        <div class="split-layout">
            <div class="controls">
                <h3>Register Student</h3>
                <div id="status-msg"></div>

                <div class="input-group">
                    <label>Student ID:</label>
                    <input type="text" id="reg-id" placeholder="e.g. S101" />
                </div>

                <div class="input-group">
                    <label>Student Name:</label>
                    <input type="text" id="reg-name" placeholder="Enter full name" />
                </div>

                <button onclick="registerStudent()">Add Student</button>
            </div>

            <div id="students-container">
                <!-- Students injected by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
