<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Product Catalog using Map - Lab Task 5" />
    <title>Product Catalog | Lab 03</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }

        .controls {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-search {
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
        }

        .btn-delete {
            background: #ef4444;
        }

        .btn-add {
            background: var(--success);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #message {
            text-align: center;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            animation: fadeUp 0.4s ease backwards;
        }

        .product-card:hover {
            align-items: center;
            border-color: var(--accent3);
        }

        .product-id {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .product-price {
            font-size: 16px;
            color: var(--success);
            font-weight: 600;
        }

        .delete-icon {
            cursor: pointer;
            color: #ef4444;
            padding: 8px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .delete-icon:hover {
            background: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="badge">ES6 Map</div>
            <h1>Product Catalog Map</h1>
            <p class="subtitle">Lab 03 &mdash; Task 05</p>
        </header>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-products">0</div>
                <div class="stat-label">Total Products</div>
            </div>
        </div>

        <div class="split-layout">
            <div class="controls">
                <h3>Manage Catalog</h3>
                <div id="message"></div>

                <hr style="border-color: var(--border); margin: 8px 0;" />

                <div class="input-group">
                    <label>Search Product ID:</label>
                    <input type="text" id="search-id" placeholder="e.g. P101" />
                    <button class="btn-search" onclick="searchProduct()">Search</button>
                </div>

                <hr style="border-color: var(--border); margin: 8px 0;" />

                <div class="input-group">
                    <label>Delete Product ID:</label>
                    <input type="text" id="delete-id" placeholder="e.g. P101" />
                    <button class="btn-delete" onclick="handleDelete()">Delete Product</button>
                </div>
            </div>

            <div class="cards-grid" id="catalog-container">
                <!-- Products injected by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
