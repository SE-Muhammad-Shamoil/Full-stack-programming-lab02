<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Unique Course Registration System using Set - Lab Task 4" />
    <title>Course Registration | Lab 03</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <style>
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 16px;
            width: 250px;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        #message {
            text-align: center;
            margin-bottom: 20px;
            min-height: 24px;
            color: var(--accent3);
            font-weight: 500;
        }

        .courses-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .course-card {
            background: var(--card);
            border: 1px solid var(--accent1);
            padding: 16px 24px;
            border-radius: var(--radius);
            font-size: 18px;
            font-weight: 600;
            animation: fadeUp 0.4s ease backwards;
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="badge">ES6 Set</div>
            <h1>Unique Course Registration</h1>
            <p class="subtitle">Lab 03 &mdash; Task 04</p>
        </header>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-courses">0</div>
                <div class="stat-label">Total Unique Courses</div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="course-input" placeholder="Enter course name..." />
            <button onclick="addCourse()">Add Course</button>
        </div>

        <div id="message"></div>

        <div class="courses-grid" id="courses-container">
            <!-- Courses injected by JS -->
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
